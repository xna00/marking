<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>改卷仙人使用说明</title>
    <style>
      em {
        color: red;
      }
    </style>
  </head>
  <body>
    <h1>改卷仙人使用说明</h1>
    <p>改卷仙人是一个基于Edge扩展的自动评分工具，用于批改学生的答题卡。</p>

    <h2>安装改卷仙人</h2>
    <ol>
      <li>
        <a id="download_link" href="./改卷仙人.bat">下载安装程序</a>
      </li>
      <li>双击下载的文件，按提示完成安装</li>
      <li>
        固定扩展程序（方便后续使用）
        <br />
        <img src="./edge_pin_extension.png" alt="" width="80%" />
      </li>
    </ol>

    <h2>更新</h2>
    <p>双击桌面快捷方式或开始菜单中的"改卷仙人"，程序会自动检查并更新到最新版本。</p>

    <h2>开始使用</h2>
    <p>单击或双击浏览器右上角的改卷仙人图标，开始使用。</p>
    <img src="./extension_icon.png" alt="" width="80%">
    <p>在弹出的页面中输入 API key</p>
    <p>在表格中设置评分标准（表格单元格可拖动调整大小）</p>
    <p>点击页面底部"评分"按钮测试配置是否正确</p>

    <h2>测试</h2>
    <p><a href="/test/" target="_blank">进入测试页</a></p>

    <script>
      const link = document.getElementById('download_link');
      link.href = link.href + '?t=' + Date.now();
    </script>
  </body>
</html>
